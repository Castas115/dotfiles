unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g base-index 1
set-option -g renumber-windows on

set -g status-position top

run-shell 'tmux set-option -g default-shell $(which fish)'
# set-option -g default-shell /usr/bin/nu

set -g pane-border-lines single

set -g default-terminal "xterm-256color"
# set -g default-terminal "${TERM}"

set-option -g status-right "  "

set -g pane-border-indicators off

### plugins ###
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '~/.tmux/envs'
set -g @resurrect-processes '"~nvim->nvim *"'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '3'

set -g @plugin 'omerxx/catppuccin-tmux'
source-file ~/.config/theme/generated/tmux.conf

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev "C-/"

run '~/.tmux/plugins/tpm/tpm'

# Override catppuccin-tmux's blue active border (must come after tpm)
set -g pane-active-border-style 'fg=default,bg=default'

set -ga status-right "#(~/.config/tmux/scripts/git_status.sh)"
set -ga status-right "#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"
set -ga status-right "#(find ~/.tmux/envs -name 'tmux_resurrect_*.txt' -mtime +7 -delete)"

source-file ~/.config/tmux/tmux.keymaps.conf
